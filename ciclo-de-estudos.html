<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciclo de Estudos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg: #0B1526;
  --paper: #1C2C4A;
  --paper-2: #16233D;
  --ink: #EAF0FA;
  --ink-soft: #8FA1C4;
  --line: #2A3B5C;
  --accent-red: #E2685B;
  --accent-gold: #E8B84B;
  --accent-blue: #6FA8DC;
  --board-bg: #060C18;
  --board-text: #F2EFE3;
  --radius: 10px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 700px 500px at 88% -4%, rgba(111,168,220,.20), transparent 65%),
    radial-gradient(ellipse 600px 400px at 6% 8%, rgba(232,184,75,.07), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:'Inter', system-ui, sans-serif;
  min-height:100vh;
  padding:32px 16px 64px;
}

.wrap{max-width:760px;margin:0 auto;}

h1,h2,h3{font-family:'Fraunces', Georgia, serif; margin:0; letter-spacing:-0.01em;}
h1{font-size:clamp(28px,5vw,40px); font-weight:700;}
h2{font-size:22px; font-weight:600;}
.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent-gold);
  font-weight:600;
}

.header{margin-bottom:28px;}
.header p{color:var(--ink-soft); margin:8px 0 0; font-size:15px; line-height:1.5;}

.progress{
  display:flex; gap:6px; margin:20px 0 0;
}
.progress span{
  flex:1; height:4px; border-radius:2px; background:var(--line);
}
.progress span.done{background:var(--accent-gold);}

.card{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:28px;
  margin-top:20px;
}

.step-title{margin-bottom:6px;}
.step-help{color:var(--ink-soft); font-size:14px; margin:4px 0 20px; line-height:1.5;}

label.field-label{
  display:block; font-size:13px; font-weight:600; color:var(--ink);
  margin-bottom:8px;
}

input[type=text], input[type=number], input[type=date]{
  width:100%;
  font-family:'Inter',sans-serif;
  font-size:15px;
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--paper-2);
  color:var(--ink);
}
input::placeholder{color:var(--ink-soft);}
input:focus, select:focus, button:focus-visible{
  outline:2px solid var(--accent-gold); outline-offset:1px;
}

.row{display:flex; gap:10px; align-items:stretch;}
.row > *{flex:1;}

select{
  width:100%; font-family:'Inter',sans-serif; font-size:15px;
  padding:11px 12px; border:1px solid var(--line); border-radius:8px; background:var(--paper-2); color:var(--ink);
}

.btn{
  font-family:'IBM Plex Mono', monospace;
  font-size:13px;
  font-weight:600;
  letter-spacing:.02em;
  border-radius:8px;
  border:1px solid transparent;
  padding:11px 18px;
  cursor:pointer;
  transition:transform .08s ease, background .15s ease;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent-gold); color:#1B2438;}
.btn-primary:hover{background:#F2C86B;}
.btn-primary:disabled{background:#2A3550; color:#6B7A99; cursor:not-allowed;}
.btn-ghost{background:transparent; color:var(--ink); border-color:var(--line);}
.btn-ghost:hover{background:var(--paper);}
.btn-danger{background:transparent; color:var(--accent-red); border-color:var(--accent-red);}
.btn-danger:hover{background:rgba(226,104,91,.14);}
.btn-small{padding:7px 12px; font-size:12px;}

.actions{display:flex; justify-content:space-between; margin-top:26px; gap:10px;}

.subject-add{display:flex; gap:8px; margin-bottom:14px;}
.subject-add input{flex:2;}
.subject-add select{flex:1;}

.subject-list{display:flex; flex-direction:column; gap:8px;}
.subject-item{
  display:flex; align-items:center; justify-content:space-between;
  border:1px solid var(--line); border-radius:8px; padding:10px 12px;
  background:var(--paper);
}
.subject-item .name{font-weight:600; font-size:14.5px;}
.subject-item .meta{display:flex; align-items:center; gap:10px;}
.pill{
  font-family:'IBM Plex Mono',monospace; font-size:11px; padding:3px 8px;
  border-radius:20px; font-weight:600; letter-spacing:.03em;
}
.pill.w1{background:#233152; color:var(--ink-soft);}
.pill.w2{background:#4A3B1E; color:#E8C97A;}
.pill.w3{background:#4A2420; color:#F2A79C;}
.remove-x{
  background:none; border:none; color:var(--ink-soft); font-size:18px; cursor:pointer; line-height:1; padding:2px 4px;
}
.remove-x:hover{color:var(--accent-red);}
.empty-hint{color:var(--ink-soft); font-size:13.5px; font-style:italic; padding:8px 0;}

.days-grid{display:flex; flex-wrap:wrap; gap:8px;}
.day-toggle{
  font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px;
  padding:10px 0; width:64px; text-align:center;
  border-radius:8px; border:1.5px solid var(--line); background:var(--paper-2); cursor:pointer;
  color:var(--ink-soft);
}
.day-toggle.active{background:var(--accent-gold); color:#1B2438; border-color:var(--accent-gold);}

.slider-row{display:flex; align-items:center; gap:16px;}
input[type=range]{flex:1; accent-color: var(--accent-gold);}
.slider-value{
  font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px; min-width:92px; text-align:right;
}

.chip-options{display:flex; gap:8px; flex-wrap:wrap;}
.chip-opt{
  font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600;
  padding:9px 16px; border-radius:20px; border:1.5px solid var(--line); background:var(--paper-2); cursor:pointer; color:var(--ink-soft);
}
.chip-opt.active{background:var(--accent-blue); color:#0D2036; border-color:var(--accent-blue);}

/* SCHEDULE VIEW */
.board-banner{
  background:
    radial-gradient(ellipse 320px 200px at 88% 0%, rgba(232,184,75,.16), transparent 65%),
    var(--board-bg);
  color:var(--board-text);
  border-radius:var(--radius); padding:22px 24px; margin-top:16px;
  border:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
}
.board-banner .exam{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent-gold);}
.board-banner .exam strong{font-size:15px;}

.week-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px; margin-top:20px;
}
.day-card{
  background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px; display:flex; flex-direction:column; gap:10px;
}
.day-card.skipped{opacity:.55; background:repeating-linear-gradient(135deg,var(--paper-2),var(--paper-2) 8px,#0F1830 8px,#0F1830 16px);}
.day-card-head{display:flex; justify-content:space-between; align-items:baseline;}
.day-card-head .wd{font-family:'Fraunces',serif; font-weight:600; font-size:17px;}
.day-card-head .dt{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);}

.block-card{
  background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px; display:flex; flex-direction:column; gap:8px; border-left-width:4px; border-left-style:solid;
}
.block-card.completed{opacity:.6;}
.block-card.completed .block-subject{text-decoration:line-through; color:var(--ink-soft);}
.block-head{display:flex; justify-content:space-between; align-items:center;}
.block-num{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:8px;}
.block-subject{font-family:'Fraunces',serif; font-weight:600; font-size:17px;}

.subject-progress-list{
  margin-top:20px; display:flex; flex-direction:column; gap:12px;
  background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px;
}
.subject-progress-row{display:flex; flex-direction:column; gap:5px;}
.spr-label{
  display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600;
}
.spr-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
.spr-mins{margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); font-weight:500;}
.spr-bar{height:6px; border-radius:4px; background:var(--paper); overflow:hidden;}
.spr-fill{height:100%; border-radius:4px; transition:width .3s ease;}

.today-tag{
  font-family:'IBM Plex Mono',monospace; font-size:10px; background:var(--accent-gold); color:#3A2600;
  padding:2px 6px; border-radius:10px; font-weight:700; letter-spacing:.05em;
}
.sessions{display:flex; flex-direction:column; gap:6px;}
.session{
  display:flex; flex-direction:column; gap:6px;
  padding:8px 10px; border-radius:6px; font-size:13px; border-left:4px solid;
  background:var(--paper);
}
.session-top{display:flex; justify-content:space-between; align-items:center;}
.session.completed .session-name{text-decoration:line-through; color:var(--ink-soft);}
.session-timer{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.timer-display{
  font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:var(--ink-soft);
  min-width:46px;
}
.timer-display.goal-hit{color:var(--accent-gold);}
.timer-btn{
  width:26px; height:26px; border-radius:50%; border:1px solid var(--line);
  background:var(--paper-2); color:var(--ink); font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; padding:0;
  transition:transform .1s ease;
}
.timer-btn:active{transform:scale(0.9);}
.timer-btn:disabled{opacity:.4; cursor:not-allowed;}
.timer-btn.complete-btn{color:var(--accent-gold); border-color:var(--accent-gold);}
.timer-btn.complete-btn.is-done{background:var(--accent-gold); color:#1B2438;}
.mins{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft); white-space:nowrap; margin-left:8px;}
.day-total{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); border-top:1px dashed var(--line); padding-top:8px;}
.day-actions{display:flex; gap:8px; margin-top:4px;}
.no-session{color:var(--ink-soft); font-size:13px; font-style:italic;}

.skip-note{
  font-size:12.5px; color:var(--accent-red); font-family:'IBM Plex Mono',monospace; margin-top:2px;
}

.bottom-actions{display:flex; justify-content:space-between; margin-top:28px; flex-wrap:wrap; gap:10px;}

.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#060C18; color:#F2EFE3; padding:12px 20px; border-radius:8px; font-size:13.5px;
  border:1px solid var(--line);
  font-family:'Inter',sans-serif; box-shadow:0 8px 24px rgba(0,0,0,.4); opacity:0; pointer-events:none;
  transition:opacity .25s ease, transform .25s ease; max-width:90vw; text-align:center;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

@media (max-width:480px){
  .card{padding:20px 16px;}
  .day-toggle{width:52px; font-size:12px;}
}

/* ---------- MAGO DECORATIVO ---------- */
.wizard-corner{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:500;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:9px;
}
.wizard-avatar-btn{
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  background:none;
  border:none;
  padding:0;
  display:block;
  animation:wizardFloat 3.6s ease-in-out infinite;
}
.wizard-avatar-btn:active{animation-duration:.4s;}
.wizard-avatar{
  width:92px; height:92px;
  border-radius:50%;
  object-fit:cover;
  display:block;
  border:3px solid var(--accent-gold);
  animation:avatarGlow 2.6s ease-in-out infinite;
}
.wizard-label{
  font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.06em;
  color:var(--ink-soft); text-align:center; margin:0;
}
.wizard-socials{display:flex; gap:8px;}
.social-btn{
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; box-shadow:0 3px 10px rgba(0,0,0,.4);
  transition:transform .15s ease;
}
.social-btn:hover{transform:translateY(-2px) scale(1.05);}
.social-btn svg{width:16px; height:16px;}
.social-btn.instagram{background:radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);}
.social-btn.telegram{background:#229ED9;}

@keyframes wizardFloat{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-6px) rotate(-1.5deg);}
}
@keyframes avatarGlow{
  0%,100%{box-shadow:0 0 0 4px rgba(232,184,75,.15), 0 0 18px 2px rgba(111,168,220,.28);}
  50%{box-shadow:0 0 0 4px rgba(232,184,75,.32), 0 0 30px 6px rgba(111,168,220,.45);}
}

.magic-sparkle{
  position:fixed;
  width:6px; height:6px;
  border-radius:50%;
  background:var(--accent-gold);
  box-shadow:0 0 6px 1px var(--accent-gold);
  pointer-events:none;
  z-index:600;
  animation:sparkleBurst .9s ease-out forwards;
}
@keyframes sparkleBurst{
  0%{transform:translate(0,0) scale(1); opacity:1;}
  100%{transform:translate(var(--dx), var(--dy)) scale(0); opacity:0;}
}

@media (prefers-reduced-motion: reduce){
  .wizard-avatar-btn, .wizard-avatar{animation:none !important;}
}
@media (max-width:480px){
  .wizard-corner{right:10px; bottom:10px; gap:6px;}
  .wizard-avatar{width:72px; height:72px;}
  .social-btn{width:28px; height:28px;}
  .social-btn svg{width:14px; height:14px;}
}
</style>
</head>

  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 3200);
}

/* ---------- ARMAZENAMENTO (funciona no Claude.ai e também como arquivo local) ---------- */
async function storageGet(key){
  if(typeof window.storage !== 'undefined'){
    try{ return await window.storage.get(key, false); }catch(e){ /* cai pro localStorage */ }
  }
  try{
    const v = localStorage.getItem(key);
    return v!==null ? {key, value:v} : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  if(typeof window.storage !== 'undefined'){
    try{ return await window.storage.set(key, value, false); }catch(e){ /* cai pro localStorage */ }
  }
  try{ localStorage.setItem(key, value); return {key, value}; }catch(e){ return null; }
}
async function storageDelete(key){
  if(typeof window.storage !== 'undefined'){
    try{ return await window.storage.delete(key, false); }catch(e){ /* cai pro localStorage */ }
  }
  try{ localStorage.removeItem(key); return {key, deleted:true}; }catch(e){ return null; }
}

async function persist(){
  try{
    await storageSet('ciclo-estudos-state', JSON.stringify({
      subjects: state.subjects,
      cycleHours: state.cycleHours,
      sessionLength: state.sessionLength,
      customSession: state.customSession,
      examDate: state.examDate,
      cycle: state.cycle ? {blocks: state.cycle.blocks} : null,
      step: state.step
    }), false);
  }catch(e){ console.error('Falha ao salvar', e); }
}

async function loadPersisted(){
  try{
    const res = await storageGet('ciclo-estudos-state');
    if(res && res.value){
      const d = JSON.parse(res.value);
      state.subjects = d.subjects || [];
      state.cycleHours = d.cycleHours ?? 20;
      state.sessionLength = d.sessionLength ?? 50;
      state.customSession = d.customSession ?? false;
      state.examDate = d.examDate || '';
      state.cycle = d.cycle || null;
      state.step = d.cycle ? 'cycle' : (d.step ?? 0);
    }
  }catch(e){ /* nada salvo ainda */ }
  render();
}

/* ---------- CRONÔMETRO ---------- */
function getElapsedSeconds(block){
  const base = block.elapsedSeconds || 0;
  if(block.running && block.startTimestamp){
    return base + (Date.now()-block.startTimestamp)/1000;
  }
  return base;
}
function formatTimer(totalSeconds){
  const s = Math.max(0, Math.floor(totalSeconds));
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return mm+':'+ss;
}
function findBlockById(id){
  if(!state.cycle) return null;
  return state.cycle.blocks.find(b=>b.id===id) || null;
}
function toggleTimer(blockId){
  const block = findBlockById(blockId);
  if(!block || block.completed) return;
  if(block.running){
    block.elapsedSeconds = getElapsedSeconds(block);
    block.running = false;
    block.startTimestamp = null;
  } else {
    block.running = true;
    block.startTimestamp = Date.now();
  }
  persist();
  render();
}
function toggleComplete(blockId){
  const block = findBlockById(blockId);
  if(!block) return;
  if(!block.completed){
    block.elapsedSeconds = getElapsedSeconds(block);
    block.running = false;
    block.startTimestamp = null;
    block.completed = true;
  } else {
    block.completed = false;
  }
  persist();
  checkCycleComplete();
  render();
}
function pularBloco(blockId){
  if(!state.cycle) return;
  const idx = state.cycle.blocks.findIndex(b=>b.id===blockId);
  if(idx===-1) return;
  const [block] = state.cycle.blocks.splice(idx,1);
  if(block.running){
    block.elapsedSeconds = getElapsedSeconds(block);
    block.running = false;
    block.startTimestamp = null;
  }
  state.cycle.blocks.push(block);
  persist();
  render();
  showToast('Bloco reorganizado pro fim do ciclo.');
}
function tickTimers(){
  if(!state.cycle) return;
  document.querySelectorAll('.timer-display').forEach(el=>{
    const block = findBlockById(el.dataset.timerId);
    if(block && block.running){
      el.textContent = formatTimer(getElapsedSeconds(block));
      el.classList.toggle('goal-hit', getElapsedSeconds(block) >= block.minutes*60);
    }
  });
}
setInterval(tickTimers, 1000);

function checkCycleComplete(){
  if(!state.cycle) return;
  const allDone = state.cycle.blocks.every(b=>b.completed);
  if(allDone){
    showToast('Ciclo completo! Clique em "Concluir ciclo" pra começar um novo. ✨');
  }
}

/* ---------- GERAÇÃO DO CICLO ---------- */
function buildCycleObject(){
  const totalMinutes = state.cycleHours*60;
  const totalWeight = state.subjects.reduce((s,x)=>s+x.weight,0);
  const subjectBlocksMap = {};
  state.subjects.forEach(sub=>{
    let total = Math.round(totalMinutes*(sub.weight/totalWeight));
    const blockLen = state.sessionLength;
    const blocks = [];
    let remaining = total;
    while(remaining>0){
      let size = Math.min(blockLen, remaining);
      if(size < 15 && blocks.length>0){
        blocks[blocks.length-1].minutes += size;
        remaining = 0;
      } else {
        blocks.push({id:uid(), subjectId:sub.id, minutes:size, completed:false, elapsedSeconds:0, running:false, startTimestamp:null});
        remaining -= size;
      }
    }
    subjectBlocksMap[sub.id] = blocks;
  });

  const order = state.subjects.map(s=>s.id);
  const interleaved = [];
  let any = true;
  while(any){
    any = false;
    for(const id of order){
      const q = subjectBlocksMap[id];
      if(q && q.length){ interleaved.push(q.shift()); any = true; }
    }
  }
  return {blocks: interleaved};
}

function generateCycle(){
  state.cycle = buildCycleObject();
  state.step = 'cycle';
  persist();
}

function concludeCycle(){
  generateCycle();
  showToast('Ciclo concluído! Um novo ciclo já foi gerado com as mesmas matérias e configurações.');
}

function resetAll(){
  state = {
    step:0, subjects:[], cycleHours:20, sessionLength:50, customSession:false, examDate:'', cycle:null
  };
  storageDelete('ciclo-estudos-state').catch(()=>{});
  render();
}

/* ---------- RENDER ---------- */
function render(){
  const app = document.getElementById('app');
  if(state.step === 'cycle' && state.cycle){
    app.innerHTML = renderCycle();
  } else {
    app.innerHTML = renderWizard();
  }
  attachHandlers();
}

function progressBar(current,total){
  let html = '<div class="progress">';
  for(let i=0;i<total;i++){
    html += `<span class="${i<=current?'done':''}"></span>`;
  }
  html += '</div>';
  return html;
}

function renderCycle(){
  const blocks = state.cycle.blocks;
  const totalPlanned = blocks.reduce((s,b)=>s+b.minutes,0);
  const completedPlanned = blocks.filter(b=>b.completed).reduce((s,b)=>s+b.minutes,0);
  const percent = totalPlanned>0 ? Math.round((completedPlanned/totalPlanned)*100) : 0;
  const firstPendingId = (blocks.find(b=>!b.completed) || {}).id;

  let examBanner = '';
  if(state.examDate){
    const exam = new Date(state.examDate+'T00:00:00');
    const diffDays = Math.ceil((exam - new Date(new Date().toDateString())) / 86400000);
    examBanner = `<div class="exam">Prova em ${formatShort(exam)} <strong>${diffDays>=0? '· faltam '+diffDays+' dia(s)' : '· já passou'}</strong></div>`;
  }

  const subjectProgress = state.subjects.map(sub=>{
    const subBlocks = blocks.filter(b=>b.subjectId===sub.id);
    const target = subBlocks.reduce((s,b)=>s+b.minutes,0);
    const done = subBlocks.filter(b=>b.completed).reduce((s,b)=>s+b.minutes,0);
    const pct = target>0 ? Math.min(100, Math.round((done/target)*100)) : 0;
    return `
      <div class="subject-progress-row">
        <div class="spr-label"><span class="spr-dot" style="background:${subjectColor(sub.id)}"></span>${escapeHtml(sub.name)}<span class="spr-mins">${done}/${target} min</span></div>
        <div class="spr-bar"><div class="spr-fill" style="width:${pct}%; background:${subjectColor(sub.id)}"></div></div>
      </div>`;
  }).join('');

  const blockCards = blocks.map((b,i)=>{
    const subj = state.subjects.find(s=>s.id===b.subjectId);
    const color = subj ? subjectColor(subj.id) : '#999';
    const isNext = b.id===firstPendingId;
    return `
      <div class="block-card ${b.completed?'completed':''}" style="border-left-color:${color}">
        <div class="block-head">
          <span class="block-num">Bloco ${i+1}${isNext?'<span class=\"today-tag\">PRÓXIMO</span>':''}</span>
          <span class="mins">${b.minutes} min</span>
        </div>
        <div class="block-subject">${subj?escapeHtml(subj.name):'—'}</div>
        <div class="session-timer">
          <span class="timer-display ${getElapsedSeconds(b)>=b.minutes*60?'goal-hit':''}" data-timer-id="${b.id}">${formatTimer(getElapsedSeconds(b))}</span>
          <button class="timer-btn" data-action="toggle-timer" data-id="${b.id}" ${b.completed?'disabled':''} aria-label="${b.running?'Pausar':'Iniciar'} cronômetro">${b.running?'⏸':'▶'}</button>
          <button class="timer-btn complete-btn ${b.completed?'is-done':''}" data-action="toggle-complete" data-id="${b.id}" aria-label="${b.completed?'Reabrir bloco':'Marcar como concluído'}">${b.completed?'↺':'✓'}</button>
          ${!b.completed?`<button class="btn btn-ghost btn-small" data-action="skip-block" data-id="${b.id}">Pular</button>`:''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="header">
      <div class="eyebrow">Seu ciclo</div>
      <h1>Ciclo de estudos</h1>
      <p>Siga os blocos na ordem, use o cronômetro pra registrar o tempo real e marque ✓ quando concluir. Se quiser deixar algo pra depois, clique em "Pular" que ele vai pro fim da fila.</p>
    </div>
    <div class="board-banner">
      <div>
        <div style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent-gold); letter-spacing:.08em;">PROGRESSO DO CICLO</div>
        <strong style="font-family:'Fraunces',serif; font-size:20px;">${percent}% concluído (${completedPlanned}/${totalPlanned} min)</strong>
      </div>
      ${examBanner}
    </div>
    <div class="subject-progress-list">${subjectProgress}</div>
    <div class="week-grid">${blockCards}</div>
    <div class="bottom-actions">
      <button class="btn btn-ghost" data-action="reset">Refazer do zero</button>
      <button class="btn btn-primary" data-action="conclude-cycle">Concluir ciclo →</button>
    </div>
  `;
}

function subjectColor(id){
  const idx = state.subjects.findIndex(s=>s.id===id);
  return SUBJECT_COLORS[idx % SUBJECT_COLORS.length];
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------- HANDLERS ---------- */

function attachHandlers(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', onAction);
  });
  const cycleHoursSlider = document.getElementById('cycle-hours-slider');
  if(cycleHoursSlider){
    cycleHoursSlider.addEventListener('input', e=>{
      state.cycleHours = parseInt(e.target.value);
      document.getElementById('cycle-hours-value').textContent = state.cycleHours+' h no ciclo';
    });
  }
  const customInput = document.getElementById('custom-session-input');
  if(customInput){
    customInput.addEventListener('input', e=>{
      const v = parseInt(e.target.value)||50;
      state.sessionLength = Math.max(10, Math.min(240, v));
    });
  }
  const examInput = document.getElementById('exam-date');
  if(examInput){
    examInput.addEventListener('change', e=>{ state.examDate = e.target.value; });
  }
  const subjName = document.getElementById('subj-name');
  if(subjName){
    subjName.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); addSubjectFromInputs(); }
    });
  }
}

function addSubjectFromInputs(){
  const nameEl = document.getElementById('subj-name');
  const weightEl = document.getElementById('subj-weight');
  const name = nameEl.value.trim();
  if(!name) return;
  state.subjects.push({id:uid(), name, weight:parseInt(weightEl.value)});
  nameEl.value='';
  render();
}

function onAction(e){
  const action = e.currentTarget.dataset.action;
  const steps = ['intro','subjects','cycleHours','session','exam','review'];
  const currentIdx = typeof state.step === 'number' ? state.step : steps.length-1;

  switch(action){
    case 'next':
      state.step = currentIdx+1;
      persist(); render();
      break;
    case 'back':
      state.step = Math.max(0, currentIdx-1);
      persist(); render();
      break;
    case 'add-subject':
      addSubjectFromInputs();
      break;
    case 'remove-subject':
      state.subjects = state.subjects.filter(s=>s.id!==e.currentTarget.dataset.id);
      render();
      break;
    case 'set-session':
      state.sessionLength = parseInt(e.currentTarget.dataset.len);
      state.customSession = false;
      render();
      break;
    case 'set-session-custom':
      state.customSession = true;
      render();
      break;
    case 'generate':
      generateCycle();
      render();
      break;
    case 'toggle-timer':
      toggleTimer(e.currentTarget.dataset.id);
      break;
    case 'toggle-complete':
      toggleComplete(e.currentTarget.dataset.id);
      break;
    case 'skip-block':
      pularBloco(e.currentTarget.dataset.id);
      break;
    case 'conclude-cycle':
      concludeCycle();
      render();
      break;
    case 'reset':
      if(confirm('Isso vai apagar seu ciclo atual e as respostas. Deseja continuar?')){
        resetAll();
      }
      break;
  }
}

/* ---------- MAGO DECORATIVO: interação ---------- */
function spawnSparkles(x, y){
  const count = 14;
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'magic-sparkle';
    const angle = (Math.PI*2*i/count) + Math.random()*0.5;
    const dist = 40 + Math.random()*50;
    el.style.left = x+'px';
    el.style.top = y+'px';
    el.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    el.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    el.style.background = i%3===0 ? '#EAF3FF' : '#E8B84B';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 950);
  }
}

function initWizard(){
  const wizard = document.getElementById('wizard-avatar-btn');
  if(!wizard) return;
  const messages = [
    'Abracadabra! Bora estudar ✨',
    'Foco total ativado 🔮',
    'Uma pitada de sorte pro seu ciclo',
    'Concentração +10 nível místico'
  ];
  wizard.addEventListener('click', (e)=>{
    const rect = wizard.getBoundingClientRect();
    spawnSparkles(rect.left+rect.width*0.5, rect.top+rect.height*0.15);
    showToast(messages[Math.floor(Math.random()*messages.length)]);
  });
}

initWizard();
loadPersisted();
